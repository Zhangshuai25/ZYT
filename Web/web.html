<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>专属浪漫告白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdf6f9;
            transition: background 1.5s ease;
            perspective: 1200px;
        }

        .photo-container {
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeScale 1.5s ease forwards;
            cursor: pointer;
        }

        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 主照片同步缩小，和立方体匹配 */
        .main-photo {
            width: 267px;
            height: 267px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.8);
        }

        .love-text {
            text-align: center;
            margin-top: 20px;
            font-size: 48px;
            font-family: "Brush Script MT", cursive;
            color: #ff5e96;
            text-shadow: 0 0 15px #ff96b8, 0 0 30px #ff69b4;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 15px #ff96b8; }
            100% { text-shadow: 0 0 30px #ff69b4; }
        }

        /* ========== 正方体缩小1/3 修改处 ========== */
        .cube-container {
            display: none;
            position: relative;
            width: 267px; /* 原400px → 缩小后267px */
            height: 267px;
            transform-style: preserve-3d;
            animation: cubeRotate 12s linear infinite;
            cursor: pointer;
        }

        @keyframes cubeRotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        /* 立方体图片尺寸同步缩小 */
        .cube-face {
            position: absolute;
            width: 267px;
            height: 267px;
            object-fit: cover;
            border: 3px solid #ff96b8;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.6);
        }

        /* 3D间距同步比例修改，保证立方体正常 */
        .front  { transform: translateZ(133px); }
        .back   { transform: rotateY(180deg) translateZ(133px); }
        .left   { transform: rotateY(-90deg) translateZ(133px); }
        .right  { transform: rotateY(90deg) translateZ(133px); }
        .top    { transform: rotateX(90deg) translateZ(133px); }
        .bottom { transform: rotateX(-90deg) translateZ(133px); }

        .particle-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a103f 0%, #000000 100%);
            z-index: 1;
            perspective: 800px;
        }

        .particle {
            position: absolute;
            color: #ff96b4;
            font-family: cursive;
            text-shadow: 0 0 10px #ff5e96;
            transform-style: preserve-3d;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="photo-container" id="photoBox">
        <img src="img/front.jpg" class="main-photo" alt="情侣合照">
        <div class="love-text">我喜欢你</div>
    </div>

    <div class="cube-container" id="cubeBox">
        <img src="img/front.jpg" class="cube-face front">
        <img src="img/back.jpg" class="cube-face back">
        <img src="img/left.jpg" class="cube-face left">
        <img src="img/right.jpg" class="cube-face right">
        <img src="img/top.jpg" class="cube-face top">
        <img src="img/bottom.jpg" class="cube-face bottom">
    </div>

    <div class="particle-container" id="particleBox"></div>

    <script>
        const photoBox = document.getElementById('photoBox');
        const cubeBox = document.getElementById('cubeBox');
        const particleBox = document.getElementById('particleBox');
        const body = document.body;

        const nickName = "赵俞婷";
        const wordList = ["我喜欢你", "I Love you", "遇见你我真的很开心", nickName, "满心是你", "余生相伴", "永远爱你"];

        setTimeout(() => {
            photoBox.style.display = 'none';
            cubeBox.style.display = 'block';
            body.style.background = '#000';
        }, 3000);

        let isParticle = false;
        cubeBox.onclick = () => {
            if (isParticle) return;
            isParticle = true;
            playNameVoice(nickName);
            cubeBox.style.display = 'none';
            particleBox.style.display = 'block';
            startWordFlow();
        };

        function playNameVoice(text){
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "zh-CN";
            msg.rate = 0.8;
            msg.pitch = 1.2;
            volume = 1;
            window.speechSynthesis.speak(msg);
        }

        function startWordFlow() {
            setInterval(() => {
                const p = document.createElement('span');
                p.className = 'particle';
                p.innerText = wordList[Math.floor(Math.random() * wordList.length)];
                const size = Math.random() * 20 + 14;
                p.style.fontSize = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.opacity = 0;
                particleBox.appendChild(p);
                flowAnimate(p);
            }, 100);
        }

        function flowAnimate(elem) {
            let z = -1000;
            let opacity = 0;
            let scale = 0.3;
            function animate() {
                z += 8;
                opacity += 0.015;
                scale += 0.008;
                if (z > 200) { z = -1000; opacity = 0; scale = 0.3; }
                elem.style.transform = `translateZ(${z}px) scale(${scale})`;
                elem.style.opacity = opacity;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
